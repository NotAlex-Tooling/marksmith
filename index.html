<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marksmith</title>
    <meta name="description" content="A fast, private, offline-capable bookmark manager that stores everything in your browser." />
    <meta name="theme-color" content="#08080a" />
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong palette. -->
    <script>
      try {
        var raw = localStorage.getItem('marksmith:state:v1');
        var theme = raw ? (JSON.parse(raw).theme || 'dark') : 'dark';
        document.documentElement.dataset.theme = theme === 'light' ? 'light' : 'dark';
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
      }
    </script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
